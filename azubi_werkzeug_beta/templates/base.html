<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Werkstatt Check{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ ingress_path }}{{ url_for('static', filename='css/style.css') }}?v=4.1">
</head>

<body class="bg-light">
  <script>
    // Critical: Apply High Contrast immediately to prevent FOUC
    (function () {
      try {
        if (localStorage.getItem('highContrast') === 'true') {
          document.body.classList.add('high-contrast-mode');
        }
      } catch (e) { }
    })();
  </script>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ ingress_path }}{{ url_for('main.index') }}">
        <i class="bi bi-tools"></i> WerkzeugMaster
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.endpoint and request.endpoint == 'main.index' else '' }}"
              href="{{ ingress_path }}{{ url_for('main.index') }}" {% if request.endpoint and
              request.endpoint=='main.index' %}aria-current="page" {% endif %}>Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.endpoint and 'history' in request.endpoint else '' }}"
              href="{{ ingress_path }}{{ url_for('main.history') }}" {% if request.endpoint and 'history' in
              request.endpoint %}aria-current="page" {% endif %}>Historie</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.endpoint and request.endpoint == 'main.tools' else '' }}"
              href="{{ ingress_path }}{{ url_for('main.tools') }}" {% if request.endpoint and
              request.endpoint=='main.tools' %}aria-current="page" {% endif %}>Werkzeuge</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.endpoint and request.endpoint == 'main.personnel' else '' }}"
              href="{{ ingress_path }}{{ url_for('main.personnel') }}" {% if request.endpoint and
              request.endpoint=='main.personnel' %}aria-current="page" {% endif %}>Personal</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.endpoint and request.endpoint == 'main.settings' else '' }}"
              href="{{ ingress_path }}{{ url_for('main.settings') }}" {% if request.endpoint and
              request.endpoint=='main.settings' %}aria-current="page" {% endif %}>Einstellungen</a>
          </li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
            <button class="btn btn-outline-light btn-sm" id="contrastToggle" title="Hoher Kontrast"
              aria-label="Hohen Kontrast umschalten">
              <i class="bi bi-circle-half" aria-hidden="true"></i>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050">
      {% for category, message in messages %}
      <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show shadow"
        role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // High Contrast Logic
    document.addEventListener('DOMContentLoaded', () => {
      console.log("High Contrast Script Loaded");
      const toggleBtn = document.getElementById('contrastToggle');
      const body = document.body;

      if (!toggleBtn) {
        console.error("Contrast Toggle Button not found!");
        return;
      }

      // Sync button state with current body class (set by top script)
      if (body.classList.contains('high-contrast-mode')) {
        toggleBtn.classList.remove('btn-outline-light');
        toggleBtn.classList.add('btn-light');
      }

      toggleBtn.addEventListener('click', () => {
        console.log("Toggle clicked");
        body.classList.toggle('high-contrast-mode');
        const isActive = body.classList.contains('high-contrast-mode');
        localStorage.setItem('highContrast', isActive);

        // Visual Feedback on button
        if (isActive) {
          toggleBtn.classList.remove('btn-outline-light');
          toggleBtn.classList.add('btn-light');
        } else {
          toggleBtn.classList.add('btn-outline-light');
          toggleBtn.classList.remove('btn-light');
        }
      });
    });
  </script>
</body>

</html>
