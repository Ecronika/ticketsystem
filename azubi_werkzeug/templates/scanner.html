{% extends "base.html" %}
{% block title %}QR Scanner{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header border-primary">
                <h5 class="mb-0 text-primary"><i class="bi bi-qr-code-scan me-2" aria-hidden="true"></i>Azubi-Karte scannen</h5>
            </div>
            <div class="card-body text-center">

                <div id="reader" class="scanner-viewport rounded overflow-hidden">
                </div>

                <div class="mt-3">
                    <p class="small opacity-75">
                        Halten Sie den QR-Code der Azubi-Karte in die Kamera.<br>
                        Der Scan erfolgt automatisch.
                    </p>
                    <div id="scan-result" class="alert alert-info d-none">
                        Scanne...
                    </div>
                </div>

                <a href="{{ ingress_path }}{{ url_for('main.index') }}" class="btn btn-secondary mt-3 px-4 py-2" style="min-height: 44px">
                    <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Zurück zum Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

{# Load html5-qrcode library from CDN #}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const readerElement = "reader";
        const resultElement = document.getElementById('scan-result');
        let isScanning = true;

        if (!window.isSecureContext) {
            resultElement.classList.remove('d-none', 'alert-info');
            resultElement.classList.add('alert-warning');
            resultElement.innerHTML = `<i class="bi bi-exclamation-triangle me-1" aria-hidden="true"></i><strong>Kamera-Zugriff blockiert:</strong> Ihr Browser blockiert die Kamera (HTTPS erforderlich).`;
            return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            resultElement.classList.remove('d-none', 'alert-info');
            resultElement.classList.add('alert-danger');
            resultElement.innerHTML = `<i class="bi bi-x-octagon me-1" aria-hidden="true"></i><strong>Kamera-Zugriff nicht möglich:</strong> Home Assistant blockiert die Kamera im Ingress-Fenster. Bitte klicken Sie rechts oben auf <strong>"In neuem Tab öffnen"</strong> oder prüfen Sie die Browser-Freigabe.`;
            return;
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return;

            console.log(`Code matched = ${decodedText}`, decodedResult);

            // Parse content: Expected format "AZUBI:<id>"
            if (decodedText.startsWith("AZUBI:")) {
                isScanning = false; // Stop further scans

                const azubiId = decodedText.split(":")[1];

                resultElement.classList.remove('d-none', 'alert-info', 'alert-danger');
                resultElement.classList.add('alert-success');
                resultElement.innerHTML = `<i class="bi bi-check-circle me-1" aria-hidden="true"></i>Karte erkannt! Leite weiter...`;
                resultElement.classList.remove('d-none');

                // 1. Feedback for the user (Vibration)
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }

                // 2. Stop camera immediately to save battery
                html5QrCode.stop().then(() => {
                    // Redirect
                    setTimeout(() => {
                        window.location.href = "{{ ingress_path }}{{ url_for('main.check_azubi', azubi_id=0) }}".replace('0', encodeURIComponent(azubiId));
                    }, 500);
                }).catch((err) => {
                    console.error("Failed to stop camera", err);
                    window.location.href = "{{ ingress_path }}{{ url_for('main.check_azubi', azubi_id=0) }}".replace('0', encodeURIComponent(azubiId));
                });
            } else {
                // Invalid code format - show to user for debugging
                resultElement.classList.remove('d-none', 'alert-info', 'alert-success');
                resultElement.classList.add('alert-warning');
                resultElement.innerHTML = `<i class="bi bi-question-circle me-1" aria-hidden="true"></i><strong>Unerkanntes Format:</strong> `;
                const span = document.createElement('span');
                span.textContent = `'${decodedText}'`;
                resultElement.appendChild(span);
            }
        }

        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning.
            // console.warn(`Code scan error = ${error}`);
        }

        // Helper for showing errors
        function showCameraError(msg) {
            resultElement.classList.remove('d-none', 'alert-info', 'alert-success');
            resultElement.classList.add('alert-danger');
            resultElement.innerHTML = `<i class="bi bi-x-octagon me-1" aria-hidden="true"></i><strong>Kamera-Fehler:</strong> ${msg}`;
        }

        // Config
        const config = {
            fps: 10,
            aspectRatio: 1.0,
            qrbox: function (viewfinderWidth, viewfinderHeight) {
                // 70% of the smallest dimension
                let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                let qrboxSize = Math.floor(minEdgeSize * 0.7);
                return { width: qrboxSize, height: qrboxSize };
            }
        };

        // Initialize directly with Html5Qrcode to avoid the dropdown UI
        const html5QrCode = new Html5Qrcode(readerElement);

        resultElement.innerHTML = "Suche Kamera...";

        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {
                // Try to start with the back camera (environment) first
                html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    onScanSuccess,
                    onScanFailure
                ).then(() => {
                    resultElement.innerHTML = "Scanne...";
                }).catch(err => {
                    // Fallback to the first available camera if "environment" fails (e.g., on some desktops)
                    html5QrCode.start(
                        devices[0].id,
                        config,
                        onScanSuccess,
                        onScanFailure
                    ).then(() => {
                        resultElement.innerHTML = "Scanne (Fallback Kamera)...";
                    }).catch(err2 => {
                        showCameraError("Kamera konnte nicht gestartet werden. Bitte Berechtigungen prüfen.");
                    });
                });
            } else {
                showCameraError("Keine Kameras gefunden.");
            }
        }).catch(err => {
            // This happens if the user denies permission, or if Ingress blocks mediaDevices completely
            showCameraError("Zugriff auf Kameras verweigert oder blockiert. Bitte Berechtigung erteilen oder Seite in neuem Tab öffnen.");
        });
    });
</script>
{% endblock %}
