{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-shield-lock"></i> Admin Login</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="mb-3">
                        <label for="pin" class="form-label">PIN eingeben</label>
                        <input type="password" class="form-control form-control-lg text-center" id="pin" name="pin"
                            required autofocus pattern="[0-9]*" inputmode="numeric" placeholder="****">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Einloggen
                        </button>
                    </div>
                    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
