{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4 mb-4">
            <div class="card-body">
                <h4 class="card-title fw-bold mb-3">Azubis verwalten</h4>

                <form action="{{ ingress_path }}{{ url_for('add_azubi') }}" method="POST" class="mb-4">
                    <div class="input-group">
                        <input type="text" name="name" class="form-control" placeholder="Name des Azubis" required>
                        <button class="btn btn-primary" type="submit"><i class="bi bi-plus-lg"></i> Hinzufügen</button>
                    </div>
                </form>

                <ul class="list-group list-group-flush">
                    {% for azubi in azubis %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        {{ azubi.name }}
                        <form action="{{ ingress_path }}{{ url_for('delete_azubi', id=azubi.id) }}" method="POST"
                            onsubmit="return confirm('Wirklich löschen?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i
                                    class="bi bi-trash"></i></button>
                        </form>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4 mb-4">
            <div class="card-body">
                <h4 class="card-title fw-bold mb-3">Werkzeuge verwalten</h4>

                <form action="{{ ingress_path }}{{ url_for('add_werkzeug') }}" method="POST" class="mb-4">
                    <div class="input-group">
                        <input type="text" name="name" class="form-control" placeholder="Bezeichnung" required>
                        <button class="btn btn-primary" type="submit"><i class="bi bi-plus-lg"></i> Hinzufügen</button>
                    </div>
                </form>

                <ul class="list-group list-group-flush">
                    {% for werkzeug in werkzeuge %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        {{ werkzeug.name }}
                        <form action="{{ ingress_path }}{{ url_for('delete_werkzeug', id=werkzeug.id) }}" method="POST"
                            onsubmit="return confirm('Wirklich löschen?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i
                                    class="bi bi-trash"></i></button>
                        </form>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
