{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-life-preserver"></i> Notfall-Login</h4>
            </div>
            <div class="card-body">
                <p class="text-muted small mb-4">Geben Sie einen Ihrer Notfall-Recovery-Tokens ein. Jeder Token ist nur
                    <strong>einmalig</strong> gültig.</p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="mb-3">
                        <label for="token" class="form-label">Recovery-Token</label>
                        <input type="text" class="form-control form-control-lg text-center font-monospace" id="token"
                            name="token" required autofocus placeholder="RT-XXXX-XXXX">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-danger btn-lg">
                            <i class="bi bi-unlock"></i> Log in und PIN zurücksetzen
                        </button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <a href="{{ ingress_path }}{{ url_for('main.login') }}" class="text-decoration-none">
                        <small class="text-muted"><i class="bi bi-arrow-left"></i> Zurück zum Login</small>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
