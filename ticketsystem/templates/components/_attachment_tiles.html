{% for attachment in attachments %}
<div class="col-6 col-md-4 col-lg-3 position-relative" id="attachment-{{ attachment.id }}">
    {% if attachment.mime_type and attachment.mime_type.startswith('image/') %}
    <a href="{{ ingress_path }}{{ url_for('main.serve_attachment', attachment_id=attachment.id) }}"
       class="lightbox-trigger" data-full-src="{{ ingress_path }}{{ url_for('main.serve_attachment', attachment_id=attachment.id) }}">
        <img src="{{ ingress_path }}{{ url_for('main.serve_attachment', attachment_id=attachment.id) }}"
             class="img-fluid rounded-3 shadow-sm border cursor-zoom-in"
             alt="Anhang zu Ticket #{{ ticket.id }} (Bild)"
             loading="lazy" decoding="async">
    </a>
    {% else %}
    <a href="{{ ingress_path }}{{ url_for('main.serve_attachment', attachment_id=attachment.id) }}"
       target="_blank" class="d-flex flex-column align-items-center justify-content-center border rounded-3 shadow-sm p-3 text-decoration-none text-center h-100 bg-surface-subtle">
        <i class="bi bi-file-earmark-text fs-2 text-primary mb-1"></i>
        <span class="small text-truncate w-100 text-body">{{ attachment.filename }}</span>
    </a>
    {% endif %}
    {% if can_delete %}
    <button type="button" class="btn btn-sm btn-danger rounded-circle position-absolute top-0 end-0 m-1 delete-attachment-btn btn-icon-sm"
            data-attachment-id="{{ attachment.id }}"
            title="Anhang löschen">
        <i class="bi bi-x-lg"></i>
    </button>
    {% endif %}
</div>
{% endfor %}
