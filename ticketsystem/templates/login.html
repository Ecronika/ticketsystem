{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-person-badge" aria-hidden="true"></i> Mitarbeiter Login</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="mb-3">
                        <label for="worker_name" class="form-label">Name eingeben</label>
                        <input type="text" class="form-control form-control-lg" id="worker_name" name="worker_name" required autofocus autocomplete="username" placeholder="Mitarbeiter-Name">
                        <div class="d-flex flex-wrap gap-2 mt-2">
                            {% for worker in workers %}
                            <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill py-1 px-3"
                                    onclick="document.getElementById('worker_name').value='{{ worker.name }}'; document.getElementById('pin').focus();">
                                <i class="bi bi-person me-1"></i>{{ worker.name }}
                            </button>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="pin" class="form-label">Persönlicher PIN</label>
                        <div class="input-group">
                            <input type="password" class="form-control form-control-lg text-center" id="pin" name="pin"
                                required pattern="[0-9]*" inputmode="numeric" placeholder="****"
                                autocomplete="current-password">
                            <button type="button" class="btn btn-outline-secondary px-3"
                                    onclick="const p=document.getElementById('pin');
                                             p.type=p.type==='password'?'text':'password';
                                             this.querySelector('i').classList.toggle('bi-eye');
                                             this.querySelector('i').classList.toggle('bi-eye-slash');"
                                    aria-label="PIN anzeigen/verbergen">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i> Einloggen
                        </button>
                    </div>
                    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                </form>
                <div class="mt-3">
                    <hr class="my-3 opacity-25">
                    <a href="{{ ingress_path }}{{ url_for('main.ticket_new') }}"
                       class="btn btn-outline-secondary w-100 rounded-pill">
                      <i class="bi bi-plus-circle me-2"></i>Ticket melden (ohne Login)
                    </a>
                </div>
                <div class="mt-3 text-center">
                    <a href="{{ ingress_path }}{{ url_for('main.recover_pin') }}" class="text-decoration-none">
                        <small class="text-muted"><i class="bi bi-life-preserver" aria-hidden="true"></i> Admin-Recovery (Notfall)</small>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
