{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-person-badge" aria-hidden="true"></i> Mitarbeiter Login</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="mb-3">
                        <label for="worker_id" class="form-label">Mitarbeiter auswählen</label>
                        <select class="form-select form-select-lg" id="worker_id" name="worker_id" required autofocus>
                            <option value="" selected disabled>-- Name wählen --</option>
                            {% for worker in workers %}
                            <option value="{{ worker.id }}">{{ worker.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="pin" class="form-label">Persönlicher PIN</label>
                        <input type="password" class="form-control form-control-lg text-center" id="pin" name="pin"
                            required pattern="[0-9]*" inputmode="numeric" placeholder="****"
                            autocomplete="current-password">
                        <div class="form-text text-center mt-2 small text-muted"><i class="bi bi-info-circle-fill" aria-hidden="true"></i> Standard-PIN für neue User: <strong>0000</strong></div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i> Einloggen
                        </button>
                    </div>
                    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                </form>
                <div class="mt-3 text-center">
                    <a href="{{ ingress_path }}{{ url_for('main.recover_pin') }}" class="text-decoration-none">
                        <small class="text-muted"><i class="bi bi-life-preserver" aria-hidden="true"></i> PIN vergessen?</small>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
