{% extends "base.html" %}
{% block title %}PIN vergessen{% endblock %}

{% block content %}
<h1 class="visually-hidden">PIN zurücksetzen</h1>
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow border-primary">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-envelope-arrow-up" aria-hidden="true"></i> PIN vergessen</h4>
            </div>
            <div class="card-body">
                <p class="text-muted small mb-3">Wählen Sie Ihren Namen aus. Wenn eine E-Mail-Adresse hinterlegt ist, erhalten Sie einen Link zum Zurücksetzen Ihres PINs.</p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="mb-3">
                        <label for="worker_id" class="form-label form-label-bold">Mitarbeiter</label>
                        <select name="worker_id" id="worker_id" class="form-select form-select-lg" required>
                            <option value="" disabled selected>-- Bitte wählen --</option>
                            {% for w in workers %}
                            <option value="{{ w.id }}">{{ w.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-send"></i> Reset-Link senden
                        </button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <a href="{{ ingress_path }}{{ url_for('main.login') }}" class="text-decoration-none">
                        <small class="text-muted"><i class="bi bi-arrow-left"></i> Zurück zum Login</small>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
