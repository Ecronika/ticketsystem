name: "Ticket System"
version: "1.0.0"

slug: "ticketsystem"
description: "A clean boilerplate for a ticket management system."
url: "https://github.com/Ecronika/ticketsystem"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: Web Interface (HTTPS when SSL is enabled)
panel_icon: mdi:ticket-confirmation
panel_title: "Ticket System"
hassio_api: false
hassio_role: default
options:
  ssl: false
  certfile: fullchain.pem
  keyfile: privkey.pem
schema:
  ssl: bool
  certfile: str
  keyfile: str