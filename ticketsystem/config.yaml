name: "Ticket System"
version: "1.16.0"

slug: "ticketsystem"
description: "A clean boilerplate for a ticket management system."
url: "https://github.com/Ecronika/ticketsystem"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
ports:
  5001/tcp: 5001
ports_description:
  5001/tcp: "Web-Schnittstelle (Direktzugriff)"

panel_icon: mdi:ticket-confirmation
panel_title: "Ticket System"
hassio_api: false
hassio_role: default
options:
  ssl: false
  certfile: fullchain.pem
  keyfile: privkey.pem
  port: 5001
schema:
  ssl: bool
  certfile: str
  keyfile: str
  port: int